# curIAtor OT - public v1 HMI-maintenance example collection.
# v1 is sim -> local SQLite historian -> Dash HMI. The MING stack is v2.

apps:
  - name: overview
    title: Tank 42 rainbow HMI baseline
    mount: { kind: dash-inproc, module: overview }
    source: apps/overview.py
    smoke: python scripts/smoke.py
    smoke_timeout: 30
    tags: [ot, hmi, rough]
    color: "#b5532d"

agent:
  adapter: codex
  model: null
  autonomy: auto-small
  sandbox: workspace-write
  timeout: 900

runner:
  mode: pinned

git:
  commit: true
  branch: curiator/auto
  signoff: true
  include_ledger: true

auth:
  mode: none
  default_user: operator@local

feedback:
  dir: feedback
  screenshots: true

shell:
  port: 8430
  title: "curIAtor OT"

tags:
  ot: "#245f73"
  hmi: "#7a3e6d"
  rough: "#b5532d"
