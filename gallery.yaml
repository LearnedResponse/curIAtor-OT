# curIAtor OT - public v1 HMI-maintenance example collection.
# v1 is sim -> local SQLite historian -> Dash HMI. The MING stack is v2.

apps:
  - name: dash_suite
    title: Dash suite
    root: apps/dash_suite
    source: .
    smoke: python ../../scripts/smoke.py
    smoke_timeout: 30
    tags: [dash, shared-root]
    color: "#b5532d"
    mounts:
      - name: overview
        title: Tank 42 rainbow HMI baseline
        source: overview.py
        mount: { kind: dash-inproc, module: overview }
        tags: [dash, ot, hmi, rough, shared-root]
        color: "#b5532d"

agent:
  adapter: codex
  model: null
  autonomy: auto-small
  sandbox: workspace-write
  timeout: 900

runner:
  mode: pinned

git:
  commit: true
  branch: curiator/auto
  signoff: true
  include_ledger: true

auth:
  mode: none
  default_user: operator@local

feedback:
  dir: feedback
  screenshots: true

shell:
  port: 8430
  title: "curIAtor OT"

tags:
  dash: "#1f6fc0"
  shared-root: "#177755"
  ot: "#245f73"
  hmi: "#7a3e6d"
  rough: "#b5532d"
