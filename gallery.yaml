# curIAtor OT - public v1 HMI-maintenance example collection.
# v1 is sim -> local SQLite historian -> Dash HMI. The MING stack is v2.

apps:
  - name: dash_suite
    title: Dash suite
    root: apps/dash_suite
    source: .
    smoke: python ../../scripts/smoke.py
    smoke_timeout: 30
    tags: [dash, shared-root]
    color: "#b5532d"
    mounts:
      - name: overview
        title: Tank 42 rainbow HMI baseline
        source: overview.py
        mount: { kind: dash-inproc, module: overview }
        tags: [dash, ot, hmi, rough, shared-root]
        color: "#b5532d"

  - name: twin_diagnostics
    title: Tank 42 twin diagnostics
    root: apps/twin_diagnostics
    source: .
    smoke: python smoke.py
    smoke_timeout: 20
    smoke_http: /api/snapshot
    mount:
      kind: engine-backed
      cmd: "python server.py --port {port} --engine-url {engine_url}"
      port: 8742
      engine: "python engine.py --port {engine_port}"
      engine_port: 8842
      engine_health: /health
    tags: [ot, hmi, twin, engine-backed]
    color: "#245f73"

agent:
  adapter: codex
  model: null
  autonomy: auto-small
  sandbox: workspace-write
  timeout: 900
  dispatch:
    anonymous: hold
    user: auto
    trusted_groups: [trusted]
  quotas:
    per_user_daily: 3
    global_daily: 25

runner:
  mode: pinned

git:
  commit: true
  branch: null   # commit to the current HEAD (main); no separate curator branch
  signoff: true
  include_ledger: true

auth:
  mode: local
  allow_anonymous: true
  admin_groups: [admin]
  anonymous_feedback_max: 20
  anonymous_feedback_window_seconds: 86400

feedback:
  dir: feedback
  screenshots: true

shell:
  port: 8430
  title: "curIAtor OT"
  base_path: /gallery/ot
  secure_cookies: true
  proxy_hops: 1

tags:
  dash: "#1f6fc0"
  shared-root: "#177755"
  ot: "#245f73"
  hmi: "#7a3e6d"
  rough: "#b5532d"
  twin: "#245f73"
  engine-backed: "#555"
